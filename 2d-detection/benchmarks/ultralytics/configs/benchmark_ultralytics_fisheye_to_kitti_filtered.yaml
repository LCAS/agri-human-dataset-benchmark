# Transfer evaluation config
# Source domain:  fisheye  (models were fine-tuned here)
# Target domain:  KITTI val (generalisation test)

# ── Target dataset ────────────────────────────────────────────────────────────
transfer_dataset: /workspace/data/kitti-filtered-yolo/data.yaml

# ── Fine-tuned checkpoints to evaluate ───────────────────────────────────────
# Point these at the best.pt from your fisheye training runs.
# You can use either:
#   - a direct path to best.pt
#   - the training run directory (script will find weights/best.pt automatically)
checkpoints:
  - /workspace/agri-human-dataset-benchmark/2d-detection/reports/benchmarks/ultralytics/runs/agri-human-detection/yolov8s4/weights/best.pt
  - /workspace/agri-human-dataset-benchmark/2d-detection/reports/benchmarks/ultralytics/runs/agri-human-detection/yolo11s4/weights/best.pt

# ── Eval settings (mirror your original benchmark for fair comparison) ────────
imgsz: 640
batch: 16
device: 0
eval_split: val
rect: false
half: false
dnn: false
workers: 8

# ── Fixed-input latency benchmark ─────────────────────────────────────────────
benchmark_fixed_input: true
benchmark_warmup: 20
benchmark_iters: 200

# ── Output organisation ────────────────────────────────────────────────────────
project: reports/benchmarks/ultralytics/runs
name: agri-human-detection

notes: >
  Transfer evaluation: fisheye fine-tuned models evaluated on KITTI val.
  Measures out-of-domain generalisation (source=fisheye, target=KITTI).