# predict_zedrgb.yaml
# This is the config file for running inference on the ZED RGB dataset using the trained YOLOv8s5 and YOLO11s2 models. It specifies the paths to the images, output directory, and model weights, as well as other parameters for the benchmark.
name: zedrgb_yolo
device: 0
workers: 8
confidence: 0.25
target_class: 0
image_ext: png

images_dir: /workspace/data/zedrgb-yolo/images/val
output_dir: /workspace/agri-human-dataset-benchmark/2d-detection/reports/detections

models:
  - name: yolov8s5
    source: /workspace/agri-human-dataset-benchmark/2d-detection/reports/benchmarks/ultralytics/runs/agri-human-detection/yolov8s5/weights/best.pt
  - name: yolo11s2
    source: /workspace/agri-human-dataset-benchmark/2d-detection/reports/benchmarks/ultralytics/runs/agri-human-detection/yolo11s2/weights/best.pt