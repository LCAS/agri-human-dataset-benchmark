# Paths resolve from 2d-tracking unless absolute.

detections_json: reports/runs/example/detections.json
frames_dir:
mot_output: reports/runs/example/boxmot_deepocsort_tracks.txt
output_video:
save_frames_dir:

frame_rate: 30.0
tracker: deepocsort
reid_weights: /path/to/osnet_x0_25_msmt17.pt
device: cpu
half: false
per_class: false
box_thickness: 2
id_offset: 10

tracker_kwargs:
  det_thresh: 0.3
  max_age: 30
  min_hits: 3
  iou_threshold: 0.3
  delta_t: 3
  asso_func: iou
  inertia: 0.2
  w_association_emb: 0.5
  alpha_fixed_emb: 0.95
